<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Construtor de História do Brasil</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Quicksand:wght@300;400;500;600;700&family=OpenDyslexic:wght@400;700&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('../src/styles/index.css');
        
        .timeline-slot {
            background: linear-gradient(145deg, #f8fafc 0%, #e2e8f0 100%);
            border: 3px dashed #cbd5e1;
            transition: all 0.3s ease;
            min-height: 120px;
        }
        
        .timeline-slot.filled {
            background: linear-gradient(145deg, #ffffff 0%, #f0f9ff 100%);
            border: 3px solid #3b82f6;
            box-shadow: 0 8px 25px rgba(59, 130, 246, 0.15);
        }
        
        .timeline-slot.drag-over {
            background: linear-gradient(145deg, #fef3c7 0%, #fbbf24 100%);
            border-color: #f59e0b;
            transform: scale(1.05);
            box-shadow: 0 12px 30px rgba(245, 158, 11, 0.3);
        }
        
        .event-card {
            background: linear-gradient(145deg, #ffffff 0%, #f8fafc 100%);
            border: 2px solid #e2e8f0;
            transition: all 0.3s ease;
            cursor: grab;
        }
        
        .event-card:hover {
            transform: translateY(-4px) scale(1.02);
            box-shadow: 0 12px 25px rgba(0, 0, 0, 0.15);
            border-color: #3b82f6;
        }
        
        .event-card:active {
            cursor: grabbing;
            transform: scale(1.1);
        }
        
        .game-gradient {
            background: linear-gradient(135deg, #fb923c 0%, #f97316 30%, #dc2626 70%, #be185d 100%);
        }
    </style>
</head>
<body>
    <div id="root">
        <div class="loading-container">
            <div class="spinner"></div>
            <p>Carregando Construtor de História do Brasil...</p>
        </div>
    </div>

    <script type="text/babel">
        const { useState, useEffect } = React;
        
        const ConstruitorHistoriaBrasil = () => {
          const [studentName, setStudentName] = useState('');
          const [fontSize, setFontSize] = useState(localStorage.getItem('selectedFont') || 'modern');
          const [gameStarted, setGameStarted] = useState(false);
          const [selectedBlock, setSelectedBlock] = useState(0);
          const [showBlockSelection, setShowBlockSelection] = useState(false);
          const [placedEvents, setPlacedEvents] = useState([null, null, null, null, null]);
          const [availableEvents, setAvailableEvents] = useState([]);
          const [correctCount, setCorrectCount] = useState(0);
          const [attempts, setAttempts] = useState([]);
          const [startTime, setStartTime] = useState(null);
          const [showCelebration, setShowCelebration] = useState(false);
          const [celebrationMessage, setCelebrationMessage] = useState('');
          const [showError, setShowError] = useState(false);
          const [errorMessage, setErrorMessage] = useState('');
          const [draggedEvent, setDraggedEvent] = useState(null);
          const [gameCompleted, setGameCompleted] = useState(false);
          const [isLoading, setIsLoading] = useState(true);

          useEffect(() => {
            const timer = setTimeout(() => setIsLoading(false), 1500);
            return () => clearTimeout(timer);
          }, []);

          const eventBlocks = [
            [
              { id: 0, year: '1500', title: 'Descobrimento do Brasil', icon: '🚢', color: 'bg-red-500' },
              { id: 1, year: '1808', title: 'Chegada da Família Real', icon: '👑', color: 'bg-blue-500' },
              { id: 2, year: '1821', title: 'Volta de Dom João VI', icon: '🇵🇹', color: 'bg-green-500' },
              { id: 3, year: '1822', title: 'Grito do Ipiranga', icon: '📢', color: 'bg-yellow-500' },
              { id: 4, year: '1822', title: 'Coroação de Dom Pedro I', icon: '👑', color: 'bg-purple-500' }
            ],
            [
              { id: 0, year: '1888', title: 'Abolição da Escravatura', icon: '⛓️', color: 'bg-indigo-500' },
              { id: 1, year: '1889', title: 'Proclamação da República', icon: '🏛️', color: 'bg-green-600' },
              { id: 2, year: '1891', title: 'Primeira Constituição Republicana', icon: '📜', color: 'bg-blue-600' },
              { id: 3, year: '1930', title: 'Era Vargas Começa', icon: '🏭', color: 'bg-gray-600' },
              { id: 4, year: '1988', title: 'Nova Constituição', icon: '⚖️', color: 'bg-red-600' }
            ]
          ];

          const blockTitles = [
            'Brasil Independente',
            'República Brasileira'
          ];

          const celebrations = [
            "ISSO AÍ! Bate palmas! 👏",
            "DEMAIS! Sorria bem grande! 😄",
            "INCRÍVEL! Você é um historiador! 🏆",
            "QUASE LÁ! Continue assim! 🌟",
            "VOCÊ CONSEGUIU! Dance de alegria! 💃"
          ];

          const errorMessages = [
            "Ops! Pense na ordem dos anos... 🤔",
            "Atenção! Veja as datas com cuidado! 📅",
            "Não foi dessa vez! Olhe o ano! 👀",
            "Quase! Verifique a cronologia! ⏰",
            "Pense: o que aconteceu primeiro? 🧠"
          ];

          useEffect(() => {
            if (gameStarted && selectedBlock !== null) {
              const events = [...eventBlocks[selectedBlock]];
              setAvailableEvents(shuffleArray(events));
              setStartTime(new Date());
            }
          }, [gameStarted, selectedBlock]);

          const shuffleArray = (array) => {
            const shuffled = [...array];
            for (let i = shuffled.length - 1; i > 0; i--) {
              const j = Math.floor(Math.random() * (i + 1));
              [shuffled[i], shuffled[j]] = [shuffled[j], shuffled[i]];
            }
            return shuffled;
          };

          const getFontClass = () => {
            switch(fontSize) {
              case 'dyslexic': return 'font-dyslexic';
              case 'playful': return 'font-playful';
              case 'modern': return 'font-modern';
              default: return 'font-modern';
            }
          };

          const startGame = () => {
            if (studentName.trim()) {
              setShowBlockSelection(true);
            }
          };

          const handleBlockSelect = (blockIndex) => {
            setSelectedBlock(blockIndex);
            setGameStarted(true);
            setShowBlockSelection(false);
          };

          const handleDragStart = (e, eventData) => {
            setDraggedEvent(eventData);
            e.dataTransfer.effectAllowed = 'move';
          };

          const handleDragOver = (e) => {
            e.preventDefault();
            e.dataTransfer.dropEffect = 'move';
            e.currentTarget.classList.add('drag-over');
          };

          const handleDragLeave = (e) => {
            e.currentTarget.classList.remove('drag-over');
          };

          const handleDrop = (e, position) => {
            e.preventDefault();
            e.currentTarget.classList.remove('drag-over');
            
            if (!draggedEvent) return;

            const isCorrect = draggedEvent.id === position;
            
            if (isCorrect) {
              const newPlaced = [...placedEvents];
              newPlaced[position] = draggedEvent;
              setPlacedEvents(newPlaced);
              setCorrectCount(prev => prev + 1);
              
              setAvailableEvents(prev => prev.filter(e => e.id !== draggedEvent.id));
              
              setCelebrationMessage(celebrations[position]);
              setShowCelebration(true);
              setTimeout(() => setShowCelebration(false), 3000);
              
              if (correctCount + 1 === 5) {
                setTimeout(() => {
                  setGameCompleted(true);
                }, 1000);
              }
            } else {
              const randomError = errorMessages[Math.floor(Math.random() * errorMessages.length)];
              setErrorMessage(randomError);
              setShowError(true);
              setTimeout(() => setShowError(false), 2500);
            }
            
            setDraggedEvent(null);
          };

          const resetGame = () => {
            setPlacedEvents([null, null, null, null, null]);
            setAvailableEvents([]);
            setCorrectCount(0);
            setAttempts([]);
            setGameCompleted(false);
            setGameStarted(false);
            setShowBlockSelection(true);
          };

          if (isLoading) {
            return (
              <div className="loading-container">
                <div className="spinner"></div>
                <p className="text-responsive-lg">Carregando Construtor de História do Brasil...</p>
              </div>
            );
          }

          // Tela inicial
          if (!gameStarted && !showBlockSelection) {
            return (
              <div className={`min-h-screen game-gradient p-4 ${getFontClass()}`}>
                <div className="max-w-2xl mx-auto">
                  <div className="bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl p-8 border border-white/20">
                    <div className="text-center mb-8">
                      <h1 className="text-responsive-2xl font-bold text-gray-800 mb-4">
                        📚 Construtor de História do Brasil
                      </h1>
                      <div className="bg-orange-100 rounded-2xl p-6 border-2 border-orange-200">
                        <p className="text-responsive-md text-orange-800 font-semibold">
                          🎯 MISSÃO: Organize os eventos históricos na ordem cronológica correta!
                        </p>
                      </div>
                    </div>
                    
                    <div className="mb-8">
                      <label className="block text-responsive-md font-semibold text-gray-700 mb-4">
                        👤 Digite seu nome:
                      </label>
                      <input
                        type="text"
                        value={studentName}
                        onChange={(e) => setStudentName(e.target.value)}
                        className="w-full p-4 border-3 border-orange-300 rounded-2xl text-responsive-md focus:border-orange-500 focus:outline-none bg-white shadow-lg"
                        placeholder="Seu nome aqui..."
                        autoFocus
                      />
                    </div>
                    
                    <div className="space-y-4">
                      <button
                        onClick={startGame}
                        disabled={!studentName.trim()}
                        className={`w-full px-8 py-4 rounded-2xl text-responsive-lg font-bold transition-all duration-300 ${
                          studentName.trim()
                            ? 'bg-gradient-to-r from-orange-500 to-red-600 text-white hover:from-orange-600 hover:to-red-700 transform hover:scale-105 shadow-xl'
                            : 'bg-gray-400 text-gray-600 cursor-not-allowed shadow-md'
                        }`}
                      >
                        🚀 Começar Construção
                      </button>
                      <a
                        href="../index.html"
                        className="block w-full px-8 py-3 text-center bg-white text-gray-700 rounded-2xl hover:bg-gray-50 transition-colors text-responsive-md font-semibold border-2 border-gray-200 shadow-lg"
                      >
                        ← Voltar ao Portal
                      </a>
                    </div>
                  </div>
                </div>
              </div>
            );
          }

          // Tela de seleção de blocos
          if (showBlockSelection && !gameStarted) {
            return (
              <div className={`min-h-screen game-gradient p-4 ${getFontClass()}`}>
                <div className="max-w-4xl mx-auto">
                  <div className="bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl p-8 border border-white/20">
                    <div className="text-center mb-8">
                      <h1 className="text-responsive-2xl font-bold text-gray-800 mb-4">
                        Olá, {studentName}! 👋
                      </h1>
                      <p className="text-responsive-lg text-gray-600">
                        Escolha um período histórico para construir:
                      </p>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                      {blockTitles.map((title, index) => (
                        <button
                          key={index}
                          onClick={() => handleBlockSelect(index)}
                          className="bg-gradient-to-br from-white to-orange-50 rounded-3xl p-8 border-3 border-orange-200 hover:border-orange-400 transition-all duration-300 transform hover:scale-105 hover:shadow-2xl"
                        >
                          <div className="text-6xl mb-4">
                            {index === 0 ? '🏛️' : '🏛️'}
                          </div>
                          <h3 className="font-bold text-responsive-xl text-gray-800 mb-3">
                            {title}
                          </h3>
                          <p className="text-gray-600">
                            5 eventos para organizar
                          </p>
                        </button>
                      ))}
                    </div>
                    
                    <div className="text-center">
                      <button
                        onClick={() => setShowBlockSelection(false)}
                        className="px-8 py-3 bg-gray-500 text-white rounded-2xl hover:bg-gray-600 transition-colors font-bold"
                      >
                        ← Voltar
                      </button>
                    </div>
                  </div>
                </div>
              </div>
            );
          }

          // Tela do jogo
          if (gameStarted && !gameCompleted) {
            return (
              <div className={`min-h-screen game-gradient p-4 ${getFontClass()}`}>
                <div className="max-w-7xl mx-auto">
                  
                  {/* Header */}
                  <div className="bg-white/95 backdrop-blur-md rounded-2xl p-6 mb-6 shadow-xl border border-white/20">
                    <div className="flex flex-col md:flex-row justify-between items-center">
                      <div>
                        <h1 className="text-responsive-xl font-bold text-gray-800">
                          📚 {studentName} - {blockTitles[selectedBlock]}
                        </h1>
                        <p className="text-gray-600">Arraste os eventos para a linha do tempo</p>
                      </div>
                      <div className="text-center mt-4 md:mt-0">
                        <div className="text-3xl font-bold text-orange-600">{correctCount}/5</div>
                        <div className="text-sm text-gray-600">Eventos Corretos</div>
                      </div>
                    </div>
                    
                    <div className="mt-4">
                      <div className="w-full bg-gray-200 rounded-full h-3 overflow-hidden">
                        <div 
                          className="bg-gradient-to-r from-orange-500 to-red-600 h-full rounded-full transition-all duration-500"
                          style={{ width: `${(correctCount / 5) * 100}%` }}
                        ></div>
                      </div>
                    </div>
                  </div>

                  <div className="grid grid-cols-1 lg:grid-cols-3 gap-8">
                    
                    {/* Timeline */}
                    <div className="lg:col-span-2">
                      <div className="bg-white/95 backdrop-blur-md rounded-3xl p-6 shadow-xl border border-white/20">
                        <h2 className="text-responsive-xl font-bold text-center text-gray-800 mb-6">
                          🕐 Linha do Tempo
                        </h2>
                        
                        <div className="space-y-4">
                          {[0, 1, 2, 3, 4].map((position) => (
                            <div
                              key={position}
                              className={`timeline-slot rounded-2xl p-4 text-center ${
                                placedEvents[position] ? 'filled' : ''
                              }`}
                              onDragOver={handleDragOver}
                              onDragLeave={handleDragLeave}
                              onDrop={(e) => handleDrop(e, position)}
                            >
                              {placedEvents[position] ? (
                                <div className="flex items-center justify-center space-x-4">
                                  <div className={`w-12 h-12 ${placedEvents[position].color} rounded-xl flex items-center justify-center text-2xl text-white shadow-lg`}>
                                    {placedEvents[position].icon}
                                  </div>
                                  <div className="text-left">
                                    <div className="font-bold text-gray-800">{placedEvents[position].year}</div>
                                    <div className="text-gray-600">{placedEvents[position].title}</div>
                                  </div>
                                </div>
                              ) : (
                                <div className="text-gray-400 font-semibold">
                                  Posição {position + 1} - Arraste um evento aqui
                                </div>
                              )}
                            </div>
                          ))}
                        </div>
                      </div>
                    </div>

                    {/* Available Events */}
                    <div>
                      <div className="bg-white/95 backdrop-blur-md rounded-3xl p-6 shadow-xl border border-white/20">
                        <h2 className="text-responsive-lg font-bold text-center text-gray-800 mb-6">
                          📋 Eventos Disponíveis
                        </h2>
                        
                        <div className="space-y-4">
                          {availableEvents.map((event) => (
                            <div
                              key={event.id}
                              className="event-card rounded-2xl p-4"
                              draggable
                              onDragStart={(e) => handleDragStart(e, event)}
                            >
                              <div className="flex items-center space-x-3">
                                <div className={`w-10 h-10 ${event.color} rounded-xl flex items-center justify-center text-xl text-white shadow-md`}>
                                  {event.icon}
                                </div>
                                <div>
                                  <div className="font-bold text-gray-800 text-sm">{event.year}</div>
                                  <div className="text-gray-600 text-xs">{event.title}</div>
                                </div>
                              </div>
                            </div>
                          ))}
                        </div>
                        
                        <div className="mt-6 text-center">
                          <button
                            onClick={resetGame}
                            className="px-6 py-3 bg-red-500 text-white rounded-xl hover:bg-red-600 transition-colors font-bold text-sm"
                          >
                            🔄 Reiniciar
                          </button>
                        </div>
                      </div>
                    </div>
                  </div>
                </div>

                {/* Celebration Modal */}
                {showCelebration && (
                  <div className="fixed inset-0 flex items-center justify-center z-50 p-4">
                    <div className="bg-black/20 absolute inset-0 backdrop-blur-sm"></div>
                    <div className="bg-white rounded-3xl p-8 text-center shadow-2xl relative transform scale-110 animate-pulse">
                      <div className="text-6xl mb-4">🎉</div>
                      <h2 className="text-2xl font-bold text-gray-800 mb-2">Parabéns!</h2>
                      <p className="text-lg text-gray-600">{celebrationMessage}</p>
                    </div>
                  </div>
                )}

                {/* Error Feedback */}
                {showError && (
                  <div className="fixed top-4 right-4 bg-red-500 text-white px-6 py-4 rounded-2xl z-50 shadow-xl">
                    <p className="font-semibold">{errorMessage}</p>
                  </div>
                )}
              </div>
            );
          }

          // Tela de conclusão
          if (gameCompleted) {
            return (
              <div className={`min-h-screen game-gradient p-4 ${getFontClass()}`}>
                <div className="max-w-2xl mx-auto">
                  <div className="bg-white/95 backdrop-blur-md rounded-3xl shadow-2xl p-8 text-center border border-white/20">
                    <div className="text-8xl mb-6 animate-bounce">🏆</div>
                    <h1 className="text-responsive-2xl font-bold text-gray-800 mb-4">
                      Parabéns, {studentName}!
                    </h1>
                    <p className="text-responsive-lg text-gray-600 mb-8">
                      Você completou o {blockTitles[selectedBlock]} com sucesso!
                    </p>
                    
                    <div className="bg-green-100 rounded-2xl p-6 mb-8 border-2 border-green-200">
                      <div className="text-4xl mb-2">⭐⭐⭐⭐⭐</div>
                      <p className="text-green-800 font-semibold">
                        Você organizou todos os 5 eventos corretamente!
                      </p>
                    </div>
                    
                    <div className="space-y-4">
                      <button
                        onClick={resetGame}
                        className="w-full px-8 py-4 bg-gradient-to-r from-orange-500 to-red-600 text-white rounded-2xl hover:from-orange-600 hover:to-red-700 transition-all duration-300 transform hover:scale-105 font-bold text-responsive-lg shadow-xl"
                      >
                        🔄 Jogar Novamente
                      </button>
                      <a
                        href="../index.html"
                        className="block w-full px-8 py-3 text-center bg-white text-gray-700 rounded-2xl hover:bg-gray-50 transition-colors text-responsive-md font-semibold border-2 border-gray-200 shadow-lg"
                      >
                        ← Voltar ao Portal
                      </a>
                    </div>
                  </div>
                </div>
              </div>
            );
          }
        };

        ReactDOM.render(<ConstruitorHistoriaBrasil />, document.getElementById('root'));
    </script>
</body>
</html>
